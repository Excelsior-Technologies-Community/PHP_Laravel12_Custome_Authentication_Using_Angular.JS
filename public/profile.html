<!DOCTYPE html>
<html lang="en" ng-app="authApp">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>User Profile</title>

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

    <script src="js/app.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container py-5">

        <div class="row justify-content-center">

            <div class="col-lg-7">

                <div class="card shadow border-0">

                    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">

                        <h3 class="mb-0">User Profile</h3>

                        <button class="btn btn-danger" ng-controller="ProfileController" ng-click="logout()">
                            Logout
                        </button>

                    </div>

                    <div class="card-body" ng-controller="ProfileController">

                        <div class="text-center mb-4">

                            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" width="100">

                            <h4 class="mt-3">
                                Welcome {{ user.name }}
                            </h4>

                        </div>

                        <table class="table table-bordered">

                            <tr>

                                <th width="35%">Name</th>

                                <td>{{ user.name }}</td>

                            </tr>

                            <tr>

                                <th>Email</th>

                                <td>{{ user.email }}</td>

                            </tr>

                            <tr>

                                <th>Member Since</th>

                                <td>{{ user.created_at | date:'dd MMM yyyy' }}</td>

                            </tr>

                        </table>

                    </div>

                    <div class="card-body border-top" ng-controller="ChangePasswordController">

                        <h4 class="mb-4">
                            Change Password
                        </h4>

                        <div class="mb-3">

                            <label class="form-label">
                                Current Password
                            </label>

                            <input type="password" class="form-control" ng-model="password.current_password">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                New Password
                            </label>

                            <input type="password" class="form-control" ng-model="password.new_password">

                        </div>

                        <div class="mb-4">

                            <label class="form-label">
                                Confirm Password
                            </label>

                            <input type="password" class="form-control" ng-model="password.new_password_confirmation">

                        </div>

                        <button class="btn btn-success w-100" ng-click="changePassword()">

                            Change Password

                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
